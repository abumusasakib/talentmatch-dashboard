name: Deploy to GitHub Pages

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Web
        run: flutter build web --release --base-href "/talentmatch-dashboard/"

      - name: Patch Assets for GitHub Pages
        run: |
          # Copy nested assets to root assets for correct loading on sub-paths
          if [ -d "build/web/assets/assets" ]; then
            cp -r build/web/assets/assets/* build/web/assets/
          fi
          # Ensure favicon.ico exists to prevent 404s
          if [ ! -f "build/web/favicon.ico" ]; then
            cp build/web/favicon.png build/web/favicon.ico || true
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
